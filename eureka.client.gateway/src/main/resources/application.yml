server:
  port: 19091

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/order/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/product/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                  - Path=/auth/signIn
          discovery:
            locator:
              enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

jwt:
  secret: "${JWT_SECRET}"